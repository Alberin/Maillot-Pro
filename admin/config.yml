backend:
  name: git-gateway
  branch: main

media_folder: "images/produits"
public_folder: "/images/produits"

collections:
  - name: "produits"
    label: "Produits"
    folder: "produits"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nom", name: "title", widget: "string" }
      - { label: "Prix (€)", name: "price", widget: "number" }
      - { label: "Image", name: "image", widget: "image" }
